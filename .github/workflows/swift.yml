# Swarm CI Workflow
# Builds and tests on macOS; verifies the Linux core build lane on Ubuntu

name: Swift CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # macOS Build & Test (full features including SwiftData)
  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Swift 6.2
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2"

      - name: Show Swift version
        run: swift --version

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-6.2-${{ hashFiles('Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-6.2-

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build

      - name: Run tests
        run: SWARM_HIVE_RUNTIME=1 SWARM_INCLUDE_HIVE=1 swift test --no-parallel

      - name: Run Hive integration tests
        run: SWARM_HIVE_RUNTIME=1 SWARM_INCLUDE_HIVE=1 swift test --no-parallel --filter HiveSwarmTests

      - name: Assert requireHive fail-closed contract
        run: SWARM_HIVE_RUNTIME=1 SWARM_INCLUDE_HIVE=1 swift test --no-parallel --filter orchestrationRequireHiveFailClosed

      - name: Run capability showcase matrix
        run: swift run SwarmCapabilityShowcase matrix

      - name: Test CodeReviewer example
        run: SWARM_CORE_ONLY=1 swift test
        working-directory: Examples/CodeReviewer

  # Linux core build lane
  build-linux:
    name: Build (Linux Core)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Swift 6.2
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2"
          skip-verify-signature: true

      - name: Verify Swift version
        run: swift --version

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: linux-swift-${{ hashFiles('Package.swift') }}
          restore-keys: |
            linux-swift-

      - name: Run Linux core lane
        run: scripts/ci/verify-linux-core.sh

  # Code Quality (macOS only - SwiftLint/SwiftFormat)
  code-quality:
    name: Code Quality
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict --config .swiftlint.yml Sources Tests

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Run SwiftFormat (check mode)
        run: swiftformat Sources Tests --lint --config .swiftformat
